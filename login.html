<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your Lumina Dining account to manage reservations and preferences.">
    <meta name="theme-color" content="#050a18">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://luminadining.com/login.html">
    <meta property="og:title" content="Login | Lumina Dining">
    <meta property="og:description" content="Login to your Lumina Dining account.">
    <meta property="og:image" content="images/hero.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://luminadining.com/login.html">
    <meta property="twitter:title" content="Login | Lumina Dining">
    <meta property="twitter:description" content="Login to your Lumina Dining account.">
    <meta property="twitter:image" content="images/hero.png">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
    <link rel="canonical" href="https://luminadining.com/login.html">

    <title>Login | Lumina Dining</title>
    <link rel="stylesheet" href="style.css">
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="loading" style="min-height: 100vh; padding: 2rem; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #0a1931 0%, #050a18 100%);">
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-logo">LUMINA</div>
            <div class="preloader-line"></div>
        </div>
    </div>
    
    <a href="index.html" class="logo" style="font-size: clamp(2rem, 5vw, 2.5rem); margin-bottom: 2rem;">LUMINA</a>

    <div class="glass glass-pad" style="width: 100%; max-width: 450px; border-radius: 40px; text-align: center;">
        <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Please enter your details to login</p>

        <form id="loginForm">
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
                <input type="email" placeholder="email@example.com" required style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;">
            </div>
            <div style="margin-bottom: 2rem; text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                <input type="password" placeholder="••••••••" required style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Login</button>
        </form>

    </div>

    <div style="margin-top: 2rem;">
        <a href="index.html" style="color: var(--text-muted); font-size: 0.9rem;">&larr; Back to Home</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
